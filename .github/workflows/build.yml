name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Lint test harness
        run: |
          brew install shellcheck
          shellcheck Tests/cli-tests.sh
      - name: Build (release)
        run: swift build -c release
      - name: Unit tests (ProductivityBreakCore)
        run: swift test
      - name: CLI tests (headless)
        run: BIN=./.build/release/productivity_break ./Tests/cli-tests.sh
