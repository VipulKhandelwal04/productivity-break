name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Validate config (headless)
        run: |
          set -euo pipefail
          ./.build/release/productivity_break --validate-config
          echo "default config OK"
          # Negative test: a bad value must exit non-zero.
          if BREAK_MINUTES=not-a-number ./.build/release/productivity_break --validate-config; then
            echo "FAIL: bad config was accepted"; exit 1
          else
            echo "bad config correctly rejected"
          fi
